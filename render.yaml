services:
  - type: web
    name: hospital-pos
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn hospital_pos.wsgi"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: DATABASE_URL
        fromDatabase:
          name: hospital-pos-db
          property: connectionString
      - key: DJANGO_ADMIN_USERNAME
        sync: false
      - key: DJANGO_ADMIN_PASSWORD
        sync: false
      - key: DJANGO_ADMIN_EMAIL
        sync: false

databases:
  - name: hospital-pos-db
    plan: free
    databaseName: hospital_pos
    user: hospital_pos
